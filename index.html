<!DOCTPYE html>
<html>
<head>
	<meta charset = "utf-8" 
	name = "description" content = "TestRun_1"
	name = "author" content = "HCl"
	name = "viewport" content = "width = device-width, initial-scale = 1.0, maximum-scale = 1.0, minimum-scale = 1.0, user-scalable = no">
	<!--	width为设置layout viewport 的宽度，为一个正整数，”width-device”表示宽度是设备屏幕的宽度
			initial-scale为设置页面的初始缩放值，可以是一个带小数的数字，1.0就是占网页的100%
			maximum-scale表示最小的缩放比例，minimum-scale表示最大的缩放比例
			user-scalable表示用户是否可以调整缩放比例，值为”no”或”yes”	

			宽度用百分比，字体大小用rem
			流动布局float
	-->

	<title>TestRun_6</title>

	<base href = "" target = "_blank">

	<!-- 根据屏幕宽度选择相应的CSS
	<link rel = "stylesheet" type = "text/css" media = "screen and (max-device-width: 600px)" href = "style/css/css600.css" />
	<link rel = "stylesheet" type = "text/css" media = "screen and (min-width: 600px) and (max-device-width: 980px)" href = "css600-980.css" />
	-->

	<style type="text/css">
		.square{
			width: 90%;
			height: 90%;
			border: 0.2rem solid #000000;
			position: absolute;
			left: 5%;
			top: 5%;
		}

		.headLine{
			font-size: 6rem;
			color: rgb(60, 20, 210);
			text-shadow: 0 0 0.3rem rgb(255, 255, 255), 0 0 0.3rem rgb(255, 255, 255);
			opacity: 0.8;
			text-align: center;
			margin-left: auto;
			margin-right: auto;
			margin-top: 18%;
		}

		.mask{
			background-color: rgb(0, 0, 0);
			opacity: 0.5;
			width: 100%;
			height: 100%;
			position: absolute;
			left: 0%;
			top: 0%;
		}

		.nav{
			width: 90%;
			height: calc(5% - 0.2rem*2);	/* 减去父区域和本区域的边界 0.2-0.2 */
			border: 0.2rem solid #000;
			position: absolute;
			left: 5%;
			top: 0;
		}

		ul {
			width: 100%;
			height: 100%;
 			overflow: hidden;
    		list-style-type: none;
		    margin: 0;
 			padding: 0;
		    border: 0rem solid #3F3;
		    background-color: #000;
		}

		li {
			width: calc(100% / 3);	/* 除以选项数 */
			height: 100%;
    		float: left;	/* 表头在左，即向右平铺项目 */
		}

		li a {
			font-size: 1.35rem;
		    display: block;
    		color: #AAA;
		    text-align: center;
		    text-decoration: none;
		    padding: auto;
		}

		li a:hover:not(.active) {
    		background-color: #555;
		}

		li a.active {
    		color: white;
		    background-color: #222;
		}

		.form_1{
			font-size: 1rem;
			color: rgb(200, 200, 200);
			position: absolute;
     		/*竖直方向居中*/
     		top: 0;
    		bottom: 0;
    		/*水平方向居中*/
    		left: 0;
    		right: 0;
			margin: auto;
		}
	</style>

	<script>
		function changeToEarthPony(){
			document.getElementById("index").background = "src/index/EarthPony.png";
			document.getElementById("HeadLine").innerHTML = "EarthPony!"
		}

		function changeToPegasus(){
			document.getElementById("index").background = "src/index/Pegasus.png";
			document.getElementById("HeadLine").innerHTML = "Pegasus!!"
		}

		function changeToUnicorn(){
			document.getElementById("index").background = "src/index/Unicorn.png";
			document.getElementById("HeadLine").innerHTML = "Unicorn!"
		}
	</script>
</head>

<body id = "index"
	background = "src/index/PonyKind.png"
	style = "background-repeat : no-repeat;
		background-size : cover;
		background-attachment : fixed;
		overflow: hidden;">
	<div class = "square"  id = "square">
		<h1 id = "HeadLine" class = "headLine">
			Ponykind!
		</h1>
		<div class = "mask">
		</div>
	</div>
	<div class = "nav">
		<ul style = "opacity: 0.8;">
			<li><a onclick = "changeToEarthPony()">EarthPony</a></li>
			<li><a onclick = "changeToPegasus()">Pegasus</a></li>
			<li><a onclick = "changeToUnicorn()">Unicorn</a></li>
		</ul>
	</div>
</body>
</html>
